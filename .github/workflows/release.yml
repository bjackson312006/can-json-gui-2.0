name: Build and Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Compute the version for this build.
  #
  # Each successful run auto-bumps the PATCH component from the newest existing
  # vX.Y.Z release, i.e. the smallest possible bump. Every build job embeds this
  # version into Cargo.toml (via `cargo set-version`) so the compiled binary's
  # CARGO_PKG_VERSION matches the published release tag -- which is exactly what
  # the in-app updater compares against.
  # ---------------------------------------------------------------------------
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Newest existing release tag of the form vX.Y.Z (empty on first run).
          latest="$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
                    --jq '.[].tag_name' 2>/dev/null \
                    | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                    | sort -V | tail -1 || true)"

          if [ -z "$latest" ]; then
            # No releases yet: seed from Cargo.toml's version (no bump).
            base="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
            major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
          else
            v="${latest#v}"
            major="${v%%.*}"; rest="${v#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
            patch=$((patch + 1))   # smallest possible bump
          fi

          version="${major}.${minor}.${patch}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"
          echo "Computed version: $version"

  linux:
    name: Linux (.deb)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: ./scripts/setup.sh

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set build version
        run: cargo set-version "${{ needs.version.outputs.version }}"

      - name: Build release binary
        run: cargo build --release

      - name: Package as .deb
        run: cargo deb --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: can-json-gui-linux-deb
          path: target/debian/*.deb

  windows:
    name: Windows (${{ matrix.arch }} .msi)
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set build version
        run: cargo set-version "${{ needs.version.outputs.version }}"

      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Neither the ARM64 runner nor (reliably) a pinned toolchain ships WiX,
          # so fetch the v3.14 binaries and expose their folder to cargo-wix.
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $zip = Join-Path $env:RUNNER_TEMP "wix314-binaries.zip"
          $dir = Join-Path $env:RUNNER_TEMP "wix3"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dir -Force
          "WIX_BIN=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release binary
        run: cargo build --release

      - name: Stage WiX config
        shell: pwsh
        run: |
          # Use our committed, shortcut-enabled WiX config (packaging/windows)
          # instead of letting `cargo wix init` regenerate its default template,
          # which creates no Start Menu / Desktop shortcuts. cargo-wix looks for
          # wix/main.wxs, so stage it there.
          New-Item -ItemType Directory -Force -Path wix | Out-Null
          Copy-Item packaging/windows/main.wxs wix/main.wxs -Force

      - name: Package as .msi
        run: cargo wix --package can-json-gui --no-build --bin-path "$env:WIX_BIN" --nocapture

      - uses: actions/upload-artifact@v4
        with:
          name: can-json-gui-windows-${{ matrix.arch }}-msi
          path: target/wix/*.msi

  macos:
    name: macOS (Universal .dmg)
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: ./scripts/setup.sh

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set build version
        run: cargo set-version "${{ needs.version.outputs.version }}"

      - name: Generate icon.icns from icon.svg
        run: |
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            rsvg-convert -h $size packaging/icon.svg > icon.iconset/icon_${size}x${size}.png
            rsvg-convert -h $((size*2)) packaging/icon.svg > icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build for x86_64 (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for arm64 (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Bundle as .app (arm64 layout)
        run: cargo bundle --release --target aarch64-apple-darwin

      - name: Combine architectures into a universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/can-json-gui \
            target/aarch64-apple-darwin/release/can-json-gui \
            -output target/aarch64-apple-darwin/release/bundle/osx/can-json-gui.app/Contents/MacOS/can-json-gui
          # Sanity check: should print both architectures
          lipo -info target/aarch64-apple-darwin/release/bundle/osx/can-json-gui.app/Contents/MacOS/can-json-gui

      - name: Package .app as .dmg
        run: |
          hdiutil create -volname "can-json-gui" \
            -srcfolder "target/aarch64-apple-darwin/release/bundle/osx/can-json-gui.app" \
            -ov -format UDZO \
            "target/aarch64-apple-darwin/release/bundle/osx/can-json-gui.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: can-json-gui-macos-dmg
          path: target/aarch64-apple-darwin/release/bundle/osx/*.dmg

  release:
    name: Publish versioned release
    needs: [version, linux, windows, macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lR artifacts

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to upload" >&2
            exit 1
          fi

          # If this exact tag already exists (e.g. a re-run), don't clobber it.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi

          # Publish an immutable, semver-tagged release. It is NOT marked as a
          # prerelease so that the GitHub `/releases/latest` endpoint returns it,
          # which is what the in-app updater queries.
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Release $TAG, built from \`main\` @ ${GITHUB_SHA}. Built by workflow run [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})." \
            "${files[@]}"
